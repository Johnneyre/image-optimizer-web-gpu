<!-- Layout Principal con Tema Dinámico -->
<div
  class="app-shell"
  [class.dark]="theme() === 'dark'"
>
  <!-- Header -->
  <app-header
    [theme]="theme()"
    [isInitializing]="isInitializing()"
    [isSupported]="isSupported()"
    [adapterInfo]="adapterInfo()"
    (themeToggle)="toggleTheme()"
  />

  <!-- Router Outlet -->
  <router-outlet />

  <!-- Error Toast -->
  @if (lastError()) {
    <div class="fixed bottom-4 right-4 max-w-sm bg-red-500/10 border border-red-500/30 rounded-lg p-4 z-50">
      <div class="flex items-start gap-3">
        <lucide-icon [img]="icons.AlertCircle" class="w-5 h-5 text-red-500 shrink-0 mt-0.5" />
        <div>
          <p class="text-sm font-medium text-red-500">Error</p>
          <p class="text-sm text-red-400 mt-1">{{ lastError() }}</p>
        </div>
      </div>
    </div>
  }
</div>
