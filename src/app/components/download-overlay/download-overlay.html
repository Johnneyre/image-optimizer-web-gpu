@if (isVisible()) {
  <div class="overlay-backdrop" [class]="theme() === 'dark' ? 'bg-slate-950/85' : 'bg-white/85'">
    <div class="overlay-content">
      <!-- Animated rings -->
      <div class="loader-rings">
        <div class="ring ring-outer"></div>
        <div class="ring ring-middle"></div>
        <div class="ring ring-inner"></div>
        <div class="ring-center">
          <lucide-icon [img]="icons.Download" class="w-8 h-8 text-cyan-400" />
        </div>
      </div>

      <div class="mt-8 text-center">
        <p class="text-lg font-semibold bg-linear-to-r from-cyan-400 to-indigo-400 bg-clip-text text-transparent">
          Generando imagen optimizada...
        </p>
        <p class="text-sm mt-2" [class]="theme() === 'dark' ? 'text-slate-400' : 'text-slate-500'">
          Procesando con WebGPU
        </p>
      </div>
    </div>
  </div>
}
