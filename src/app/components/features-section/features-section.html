<section class="features-section" [class]="theme() === 'dark' ? 'theme-dark' : 'theme-light'">
  <h2 class="features-title">Features</h2>

  <div class="features-grid">
    @for (feature of features; track feature.title) {
      <div class="feature-card">
        <div class="feature-icon-wrapper" [class]="feature.iconClass">
          <lucide-icon [img]="feature.icon" class="feature-icon" />
        </div>
        <h3 class="feature-title-card">{{ feature.title }}</h3>
        <p class="feature-desc">{{ feature.description }}</p>
      </div>
    }
  </div>
</section>
