<header class="site-header">
  <div class="header-container">
    <div class="header-brand">
      <div class="header-logo">
        <lucide-icon [img]="icons.Zap" [size]="18" [strokeWidth]="2" />
      </div>
      <div>
        <h1 class="header-name">ImageOptimize</h1>
        <p class="header-tagline">WebGPU-Powered</p>
      </div>
    </div>

    <div class="header-actions">
      <!-- GPU Status -->
      @if (isInitializing()) {
        <div class="header-status">
          <lucide-icon [img]="icons.Loader2" [size]="16" [strokeWidth]="2" class="animate-spin" />
          <span class="header-status-text">Inicializando WebGPU...</span>
        </div>
      } @else if (isSupported() === false) {
        <div class="header-status header-status-error">
          <lucide-icon [img]="icons.AlertCircle" [size]="16" [strokeWidth]="2" />
          <span class="header-status-text">WebGPU no soportado</span>
        </div>
      } @else if (adapterInfo()) {
        <div class="header-gpu-info">
          <lucide-icon [img]="icons.Gpu" [size]="14" [strokeWidth]="2" />
          <span>{{ adapterInfo() }}</span>
        </div>
      }

      <!-- Theme Toggle -->
      <button
        class="header-theme-toggle"
        (click)="onToggleTheme()"
        [title]="theme() === 'dark' ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
      >
        <lucide-icon [img]="theme() === 'dark' ? icons.Sun : icons.Moon" [size]="20" [strokeWidth]="2" />
      </button>
    </div>
  </div>
</header>
