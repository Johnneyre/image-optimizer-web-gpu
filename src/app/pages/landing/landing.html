<div class="landing-page" [class.dark]="theme() === 'dark'">
  <!-- Unified hero + upload background -->
  <div class="landing-hero-area">
    <!-- Background grid -->
    <div class="landing-grid-bg" aria-hidden="true"></div>

    <!-- Ambient glows -->
    <div class="landing-glow landing-glow-center" aria-hidden="true"></div>
    <div class="landing-glow landing-glow-right" aria-hidden="true"></div>
    <div class="landing-glow landing-glow-left" aria-hidden="true"></div>

    <!-- Hero Section -->
    <app-hero-section />

    <!-- Upload Zone -->
    <app-upload-zone (fileSelected)="onFileSelected($event)" />

    <!-- Stats Section -->
    <app-stats-section />
  </div>

  <!-- How It Works Section -->
  <app-how-it-works />

  <!-- Features Section -->
  <app-features-section />

  <!-- Footer -->
  <app-site-footer />
</div>
